<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Ignitus Portfolio</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html {
      width: 100%; height: 100%;
      background: #080B10;
    }
    body {
      width: 100%; height: 100%;
      background: #080B10;
      color: #E8EDF8;
      font-family: 'DM Sans', system-ui, sans-serif;
      /* DO NOT use overflow:hidden on body — iOS Safari dismisses keyboard when body cannot scroll */
      overflow: auto;
      /* Prevent iOS bounce on body, keep it on scroll containers */
      overscroll-behavior: none;
    }
    #root {
      width: 100%;
      /* Use min-height instead of height:100vh — avoids iOS viewport resize loop when keyboard opens */
      min-height: 100%;
      min-height: -webkit-fill-available;
      background: #080B10;
      overflow: hidden;
    }
    #loading {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #080B10; z-index: 999;
      gap: 16px;
    }
    #loading .logo { font-size: 32px; font-weight: 800; color: #00CFFF; letter-spacing: -1px; }
    #loading .sub  { font-size: 12px; color: #6B7A99; text-align: center; max-width: 280px; }
    #loading .bar  { width: 120px; height: 2px; background: #243550; border-radius: 1px; overflow: hidden; }
    #loading .fill { width: 60%; height: 100%; background: #00CFFF; border-radius: 1px;
                     animation: slide 1s ease-in-out infinite alternate; }
    @keyframes slide { from { transform: translateX(-40px); } to { transform: translateX(60px); } }
  </style>
</head>
<body>
  <div id="loading">
    <div class="logo">IGNITUS</div>
    <div class="sub" id="load-msg">Connecting to database...</div>
    <div class="bar"><div class="fill"></div></div>
  </div>
  <div id="root"></div>

  <!-- React 18 + Babel standalone -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script>
  (async function() {
    const msg = document.getElementById('load-msg');
    const SB_URL = 'https://ckyshjxznltdkxfvhfdy.supabase.co';
    const SB_KEY = 'sb_publishable_y-wyxLIPM0eiQOezFH6UYQ_WEJzxLGz';
    const HDR = {
      'apikey': SB_KEY,
      'Authorization': 'Bearer ' + SB_KEY,
      'Content-Type': 'application/json',
      'Prefer': 'return=minimal'
    };

    // ── Supabase helpers ──────────────────────────────────────────────────────
    async function sbGet(table, query) {
      const r = await fetch(SB_URL + '/rest/v1/' + table + '?' + (query||''), { headers: HDR });
      if (!r.ok) throw new Error('Supabase ' + table + ': ' + r.status);
      return r.json();
    }
    async function sbUpsert(table, rows) {
      if (!rows || !rows.length) return;
      const r = await fetch(SB_URL + '/rest/v1/' + table + '?on_conflict=id', {
        method: 'POST',
        headers: { ...HDR, 'Prefer': 'resolution=merge-duplicates,return=minimal' },
        body: JSON.stringify(rows)
      });
      return r.ok;
    }
    async function sbDelete(table, query) {
      const r = await fetch(SB_URL + '/rest/v1/' + table + '?' + query, {
        method: 'DELETE', headers: HDR
      });
      return r.ok;
    }

    // ── window.portfolioDB shim — mirrors Electron preload API ────────────────
    window.portfolioDB = {
      async load() {
        msg.textContent = 'Loading holdings...';
        const [holdings, trades, senate] = await Promise.all([
          sbGet('holdings', 'order=ticker'),
          sbGet('trades',   'order=date.desc'),
          sbGet('senate',   'order=date.desc&limit=200'),
        ]);
        // Normalise field names (snake_case DB → camelCase app)
        const h = (holdings || []).map(r => ({
          id: r.id, ticker: r.ticker, name: r.name, mkt: r.mkt,
          sector: r.sector || '', msStyle: r.ms_style || '',
          shares: Number(r.shares) || 0,
          avgCost: Number(r.avg_cost) || 0,
          price: Number(r.price) || 0,
          intrinsic: Number(r.intrinsic) || 0,
          moat: r.moat || 'None',
          divYield: Number(r.div_yield) || 0,
          peRatio: Number(r.pe_ratio) || 0,
          revenueGrowth: Number(r.revenue_growth) || 0,
          senateBuys: Number(r.senate_buys) || 0,
          senateSells: Number(r.senate_sells) || 0,
          heldSince: r.held_since || null,
          isEtf: r.is_etf || false,
          intrinsicMethod: r.intrinsic_method || null,
          intrinsicUpdatedAt: r.intrinsic_updated_at || null,
        }));
        const t = (trades || []).map(r => ({
          id: r.id, ticker: r.ticker, type: r.type,
          date: r.date, price: Number(r.price) || 0,
          shares: Number(r.shares) || 0,
          mkt: r.mkt || 'US', ccy: r.ccy || 'USD',
          profit: Number(r.profit) || 0,
        }));
        const s = (senate || []).map(r => ({
          id: r.id, name: r.name, party: r.party,
          ticker: r.ticker, action: r.action, amount: r.amount,
          date: r.date, sector: r.sector || '',
          estPrice: Number(r.est_price) || 0,
          priceNow: Number(r.price_now) || 0,
          source: r.source || '',
        }));
        return { holdings: h, trades: t, senate: s };
      },
      async updateHoldings(holdings) {
        if (!holdings || !holdings.length) return;
        const rows = holdings.map(h => ({
          id: h.id,
          ticker: h.ticker, name: h.name, mkt: h.mkt,
          sector: h.sector || '', ms_style: h.msStyle || '',
          shares: h.shares, avg_cost: h.avgCost,
          price: h.price, intrinsic: h.intrinsic || 0,
          moat: h.moat || 'None',
          div_yield: h.divYield || 0,
          pe_ratio: h.peRatio || 0,
          revenue_growth: h.revenueGrowth || 0,
          senate_buys: h.senateBuys || 0,
          senate_sells: h.senateSells || 0,
          held_since: h.heldSince || null,
          is_etf: h.isEtf || false,
          intrinsic_method: h.intrinsicMethod || null,
          intrinsic_updated_at: h.intrinsicUpdatedAt || null,
        }));
        return sbUpsert('holdings', rows);
      },
      async deleteTrade(id) {
        return sbDelete('trades', 'id=eq.' + id);
      },
      async deleteHolding(ticker) {
        return sbDelete('holdings', 'ticker=eq.' + encodeURIComponent(ticker));
      },
      async updateTrades(trades) {
        if (!trades || !trades.length) return;
        const rows = trades.map(t => ({
          id: t.id, ticker: t.ticker, type: t.type,
          date: t.date, price: t.price, shares: t.shares,
          mkt: t.mkt || 'US', ccy: t.ccy || 'USD',
          profit: t.profit || 0,
        }));
        return sbUpsert('trades', rows);
      }
    };

    // ── Load app.jsx via Babel Web Worker (non-blocking) ─────────────────────
    try {
      msg.textContent = 'Loading app...';
      const resp = await fetch('./app.jsx?v=' + Date.now());
      if (!resp.ok) throw new Error('Failed to fetch app.jsx: ' + resp.status);
      const source = await resp.text();
      msg.textContent = 'Compiling...';

      // Compile in a Web Worker so main thread stays responsive
      await new Promise((resolve, reject) => {
        const worker = new Worker('./babel-worker.js');
        worker.onmessage = function(e) {
          worker.terminate();
          if (!e.data.ok) {
            reject(new Error('Babel error: ' + e.data.error));
            return;
          }
          try {
            msg.textContent = 'Starting...';
            const script = document.createElement('script');
            script.textContent = e.data.code;
            document.body.appendChild(script);
            resolve();
          } catch(runErr) {
            reject(runErr);
          }
        };
        worker.onerror = function(e) {
          worker.terminate();
          reject(new Error('Worker error: ' + e.message));
        };
        worker.postMessage(source);
      });

    } catch(err) {
      document.getElementById('loading').innerHTML =
        '<div style="color:#FF5577;font-size:13px;padding:24px;font-family:monospace;text-align:left;max-width:90vw;overflow:auto">' +
        '<b>🔴 Load Error — Screenshot and send to developer:</b><br><br>' + err.message +
        '<br><br><pre style="font-size:10px;white-space:pre-wrap;color:#FF8899">' +
        (err.stack||'') + '</pre></div>';
    }
  })();
  </script>
</body>
</html>
