<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Ignitus Portfolio</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { width: 100%; height: 100%; background: #080B10; }
    body {
      width: 100%; height: 100%; background: #080B10;
      color: #E8EDF8; font-family: 'DM Sans', system-ui, sans-serif;
      overflow: auto; overscroll-behavior: none;
    }
    #root { width: 100%; min-height: 100%; min-height: -webkit-fill-available; background: #080B10; overflow: hidden; }
    #loading {
      position: fixed; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #080B10; z-index: 999; gap: 16px;
    }
    #loading .logo { font-size: 32px; font-weight: 800; color: #00CFFF; letter-spacing: -1px; }
    #loading .sub  { font-size: 12px; color: #6B7A99; text-align: center; max-width: 280px; }
    #loading .bar  { width: 120px; height: 2px; background: #243550; border-radius: 1px; overflow: hidden; }
    #loading .fill { width: 60%; height: 100%; background: #00CFFF; border-radius: 1px;
                     animation: slide 1s ease-in-out infinite alternate; }
    @keyframes slide { from { transform: translateX(-40px); } to { transform: translateX(60px); } }

    /* ── Login form ───────────────────────────────────────────────────────── */
    #login-screen {
      display: none; position: fixed; inset: 0; background: #080B10;
      z-index: 1000; align-items: center; justify-content: center;
    }
    #login-screen.visible { display: flex; }
    .login-box {
      background: #111827; border: 1px solid #1E3050; border-radius: 16px;
      padding: 32px 28px; width: 100%; max-width: 360px; margin: 0 16px;
    }
    .login-logo  { font-size: 28px; font-weight: 800; color: #00CFFF; letter-spacing: -1px; margin-bottom: 4px; }
    .login-sub   { font-size: 12px; color: #6B7A99; margin-bottom: 24px; }
    .login-label { font-size: 11px; color: #6B7A99; margin-bottom: 5px; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; }
    .login-input {
      width: 100%; background: #0D1421; border: 1px solid #1E3050;
      border-radius: 8px; padding: 11px 12px; color: #E8EDF8;
      font-size: 14px; margin-bottom: 14px; outline: none;
      font-family: inherit;
    }
    .login-input:focus { border-color: #00CFFF60; }
    .login-btn {
      width: 100%; padding: 12px; border-radius: 8px; border: none;
      background: #00CFFF; color: #080B10; font-size: 14px;
      font-weight: 700; cursor: pointer; font-family: inherit;
      margin-top: 4px;
    }
    .login-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .login-btn:not(:disabled):hover { background: #00DFFF; }
    .login-error { font-size: 12px; color: #FF5577; margin-bottom: 12px; padding: 8px 10px;
                   background: #FF557710; border-radius: 6px; display: none; }
    .login-error.visible { display: block; }
    .login-note { font-size: 11px; color: #4B5A74; margin-top: 16px; text-align: center; line-height: 1.5; }
  </style>
</head>
<body>
  <!-- Loading spinner (shown while checking auth / loading app) -->
  <div id="loading">
    <div class="logo">IGNITUS</div>
    <div class="sub" id="load-msg">Checking authentication...</div>
    <div class="bar"><div class="fill"></div></div>
  </div>

  <!-- Login gate -->
  <div id="login-screen">
    <div class="login-box">
      <div class="login-logo">IGNITUS</div>
      <div class="login-sub">Personal Portfolio Tracker</div>
      <div class="login-error" id="login-err"></div>
      <div class="login-label">Email</div>
      <input class="login-input" id="login-email" type="email"    placeholder="your@email.com"  autocomplete="email"/>
      <div class="login-label">Password</div>
      <input class="login-input" id="login-pwd"   type="password" placeholder="••••••••"        autocomplete="current-password"
             onkeydown="if(event.key==='Enter')doAuth()"/>
      <button class="login-btn" id="login-btn" onclick="doAuth()">Sign In</button>
      <div class="login-note" id="login-note">Your data is encrypted in transit. Only you can access this portfolio.</div>
    </div>
  </div>

  <div id="root"></div>

  <!-- React 18 + Babel standalone -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script>
  // ── Login UI helper (global scope for onclick) ──────────────────────────────
  function doAuth() {
    if (window._authHandler) window._authHandler(
      document.getElementById('login-email').value.trim(),
      document.getElementById('login-pwd').value,
      'signin'
    );
  }
  </script>

  <script>
  (async function() {
    const msg     = document.getElementById('load-msg');
    const loading = document.getElementById('loading');

    // ── Supabase constants ────────────────────────────────────────────────────
    const SB_URL = 'https://ckyshjxznltdkxfvhfdy.supabase.co';
    const SB_KEY = 'sb_publishable_y-wyxLIPM0eiQOezFH6UYQ_WEJzxLGz'; // anon key (public — RLS blocks unauthenticated access)

    // ── Auth state ────────────────────────────────────────────────────────────
    let currentJWT = null; // set after successful login; role='authenticated'

    function getHDR(extra) {
      // Always use currentJWT as Bearer token after login.
      // RLS policies now require auth.role()='authenticated' — anon key alone is rejected.
      return Object.assign({
        'apikey'       : SB_KEY,
        'Authorization': 'Bearer ' + (currentJWT || SB_KEY),
        'Content-Type' : 'application/json',
        'Prefer'       : 'return=minimal'
      }, extra || {});
    }

    // ── Session management ────────────────────────────────────────────────────
    async function tryRestoreSession() {
      const jwt     = localStorage.getItem('ign_jwt');
      const refresh = localStorage.getItem('ign_refresh');
      if (!jwt) return false;
      try {
        // Decode without verification (signature checked by Supabase server)
        const payload = JSON.parse(atob(jwt.split('.')[1].replace(/-/g,'+').replace(/_/g,'/')));
        if (payload.exp > Date.now() / 1000 + 60) { // >60s of validity remaining
          currentJWT = jwt;
          scheduleTokenRefresh(payload.exp);
          return true;
        }
      } catch(e) { /* malformed JWT */ }
      // Token expired or malformed — try refresh
      if (refresh) return await doTokenRefresh(refresh);
      clearStoredSession();
      return false;
    }

    async function doTokenRefresh(refreshToken) {
      try {
        const r = await fetch(SB_URL + '/auth/v1/token?grant_type=refresh_token', {
          method : 'POST',
          headers: { 'Content-Type': 'application/json', 'apikey': SB_KEY },
          body   : JSON.stringify({ refresh_token: refreshToken })
        });
        if (r.ok) {
          const d = await r.json();
          storeSession(d.access_token, d.refresh_token);
          return true;
        }
      } catch(e) {}
      clearStoredSession();
      return false;
    }

    function storeSession(jwt, refresh) {
      currentJWT = jwt;
      localStorage.setItem('ign_jwt',     jwt);
      localStorage.setItem('ign_refresh', refresh);
      try {
        const payload = JSON.parse(atob(jwt.split('.')[1].replace(/-/g,'+').replace(/_/g,'/')));
        scheduleTokenRefresh(payload.exp);
      } catch(e) {}
    }

    function clearStoredSession() {
      currentJWT = null;
      localStorage.removeItem('ign_jwt');
      localStorage.removeItem('ign_refresh');
    }

    function scheduleTokenRefresh(expEpoch) {
      // Refresh 2 minutes before expiry
      const msUntilRefresh = (expEpoch - Date.now() / 1000 - 120) * 1000;
      if (msUntilRefresh > 0) {
        setTimeout(async () => {
          const r = localStorage.getItem('ign_refresh');
          if (r) await doTokenRefresh(r);
        }, msUntilRefresh);
      }
    }

    // ── Login handler (sign-in only) ────────────────────────────────────────────
    async function authUser(email, password) {
      const errEl  = document.getElementById('login-err');
      const btnEl  = document.getElementById('login-btn');
      errEl.className = 'login-error';
      btnEl.disabled  = true;
      btnEl.textContent = 'Signing in…';

      const endpoint = SB_URL + '/auth/v1/token?grant_type=password';

      try {
        const r = await fetch(endpoint, {
          method : 'POST',
          headers: { 'Content-Type': 'application/json', 'apikey': SB_KEY },
          body   : JSON.stringify({ email, password })
        });
        const d = await r.json();
        if (!r.ok) {
          const e = d.error_description || d.msg || d.message || 'Authentication failed';
          errEl.textContent = e;
          errEl.className   = 'login-error visible';
          btnEl.disabled    = false;
          btnEl.textContent = 'Sign In';
          return;
        }
        storeSession(d.access_token, d.refresh_token);
        // Hide login screen and load app
        document.getElementById('login-screen').className = '';
        loading.style.display = 'flex';
        msg.textContent = 'Loading your portfolio…';
        await loadApp();
      } catch(ex) {
        errEl.textContent = 'Network error: ' + ex.message;
        errEl.className   = 'login-error visible';
        btnEl.disabled    = false;
        btnEl.textContent = 'Sign In';
      }
    }
    window._authHandler = authUser; // wired to onclick in global scope

    // ── Supabase REST helpers (use getHDR() so they pick up the session JWT) ──
    async function sbGet(table, query) {
      const r = await fetch(SB_URL + '/rest/v1/' + table + '?' + (query||''), { headers: getHDR() });
      if (!r.ok) throw new Error('Supabase ' + table + ': ' + r.status);
      return r.json();
    }
    async function sbGetAll(table, query) {
      const PAGE = 1000;
      let all = [], offset = 0;
      while (true) {
        const q = (query || '') + '&limit=' + PAGE + '&offset=' + offset;
        const r = await fetch(SB_URL + '/rest/v1/' + table + '?' + q, { headers: getHDR() });
        if (!r.ok) throw new Error('Supabase ' + table + ': ' + r.status);
        const rows = await r.json();
        if (!Array.isArray(rows) || rows.length === 0) break;
        all = all.concat(rows);
        if (rows.length < PAGE) break;
        offset += PAGE;
      }
      return all;
    }
    async function sbUpsert(table, rows) {
      if (!rows || !rows.length) return;
      const r = await fetch(SB_URL + '/rest/v1/' + table + '?on_conflict=id', {
        method : 'POST',
        headers: getHDR({ 'Prefer': 'resolution=merge-duplicates,return=minimal' }),
        body   : JSON.stringify(rows)
      });
      return r.ok;
    }
    async function sbDelete(table, query) {
      const r = await fetch(SB_URL + '/rest/v1/' + table + '?' + query, {
        method : 'DELETE',
        headers: getHDR()
      });
      return r.ok;
    }

    // ── portfolioDB shim ──────────────────────────────────────────────────────
    function setupPortfolioDB() {
      window.portfolioDB = {
        async load() {
          msg.textContent = 'Loading holdings…';
          const [holdings, trades, senate] = await Promise.all([
            sbGet('holdings', 'order=ticker'),
            sbGetAll('trades', 'order=date.desc'),
            sbGet('senate',   'order=date.desc&limit=200'),
          ]);
          const h = (holdings || []).map(r => ({
            id: r.id, ticker: r.ticker, name: r.name, mkt: r.mkt,
            sector: r.sector || '', msStyle: r.ms_style || '',
            shares: Number(r.shares) || 0, avgCost: Number(r.avg_cost) || 0,
            price: Number(r.price) || 0, intrinsic: Number(r.intrinsic) || 0,
            moat: r.moat || 'None', divYield: Number(r.div_yield) || 0,
            peRatio: Number(r.pe_ratio) || 0, revenueGrowth: Number(r.revenue_growth) || 0,
            senateBuys: Number(r.senate_buys) || 0, senateSells: Number(r.senate_sells) || 0,
            heldSince: r.held_since || null, isEtf: r.is_etf || false,
            intrinsicMethod: r.intrinsic_method || null,
            intrinsicUpdatedAt: r.intrinsic_updated_at || null,
          }));
          const t = (trades || []).map(r => ({
            id: r.id, ticker: r.ticker, type: r.type, date: r.date,
            price: Number(r.price) || 0, shares: Number(r.shares) || 0,
            mkt: r.mkt || 'US', ccy: r.ccy || 'USD',
            profit: Number(r.profit) || 0, divMode: r.div_mode || null,
          }));
          const s = (senate || []).map(r => ({
            id: r.id, name: r.name, party: r.party,
            ticker: r.ticker, action: r.action, amount: r.amount,
            date: r.date, sector: r.sector || '',
            estPrice: Number(r.est_price) || 0, priceNow: Number(r.price_now) || 0,
            source: r.source || '',
          }));
          return { holdings: h, trades: t, senate: s };
        },
        async updateHoldings(holdings) {
          if (!holdings || !holdings.length) return;
          const rows = holdings.map(h => ({
            id: h.id, ticker: h.ticker, name: h.name, mkt: h.mkt,
            sector: h.sector || '', ms_style: h.msStyle || '',
            shares: h.shares, avg_cost: h.avgCost, price: h.price,
            intrinsic: h.intrinsic || 0, moat: h.moat || 'None',
            div_yield: h.divYield || 0, pe_ratio: h.peRatio || 0,
            revenue_growth: h.revenueGrowth || 0,
            senate_buys: h.senateBuys || 0, senate_sells: h.senateSells || 0,
            held_since: h.heldSince || null, is_etf: h.isEtf || false,
            intrinsic_method: h.intrinsicMethod || null,
            intrinsic_updated_at: h.intrinsicUpdatedAt || null,
          }));
          return sbUpsert('holdings', rows);
        },
        async deleteTrade(id)      { return sbDelete('trades',   'id=eq.' + id); },
        async deleteHolding(ticker){ return sbDelete('holdings', 'ticker=eq.' + encodeURIComponent(ticker)); },
        async updateTrades(trades) {
          if (!trades || !trades.length) return;
          const rows = trades.map(t => ({
            id: t.id, ticker: t.ticker, type: t.type, date: t.date,
            price: t.price, shares: t.shares,
            mkt: t.mkt || 'US', ccy: t.ccy || 'USD',
            profit: t.profit || 0, div_mode: t.divMode || null,
          }));
          return sbUpsert('trades', rows);
        },
        // Expose sign-out so app.jsx logout button can call it
        signOut() {
          clearStoredSession();
          location.reload();
        }
      };
    }

    // ── Load and compile app.jsx ──────────────────────────────────────────────
    async function loadApp() {
      setupPortfolioDB();
      try {
        msg.textContent = 'Loading app…';
        const resp = await fetch('./app.jsx?v=' + Date.now());
        if (!resp.ok) throw new Error('Failed to fetch app.jsx: ' + resp.status);
        const source = await resp.text();
        msg.textContent = 'Compiling…';

        await new Promise((resolve, reject) => {
          const worker = new Worker('./babel-worker.js');
          worker.onmessage = function(e) {
            worker.terminate();
            if (!e.data.ok) { reject(new Error('Babel error: ' + e.data.error)); return; }
            try {
              msg.textContent = 'Starting…';
              const script = document.createElement('script');
              script.textContent = e.data.code;
              document.body.appendChild(script);
              resolve();
            } catch(runErr) { reject(runErr); }
          };
          worker.onerror = function(e) { worker.terminate(); reject(new Error('Worker error: ' + e.message)); };
          worker.postMessage(source);
        });

      } catch(err) {
        loading.innerHTML =
          '<div style="color:#FF5577;font-size:13px;padding:24px;font-family:monospace;text-align:left;max-width:90vw;overflow:auto">' +
          '<b>🔴 Load Error — Screenshot and send to developer:</b><br><br>' + err.message +
          '<br><br><pre style="font-size:10px;white-space:pre-wrap;color:#FF8899">' +
          (err.stack||'') + '</pre></div>';
      }
    }

    // ── Entry point ───────────────────────────────────────────────────────────
    const hasSession = await tryRestoreSession();

    if (hasSession) {
      // Valid session found — load directly
      msg.textContent = 'Loading your portfolio…';
      await loadApp();
    } else {
      // No valid session — show login gate
      loading.style.display = 'none';
      document.getElementById('login-screen').className = 'visible';
    }

  })();
  </script>
</body>
</html>
